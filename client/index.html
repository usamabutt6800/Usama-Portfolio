<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── SEO ─────────────────────────────────────────────────────────── -->
    <title>Your Name | MERN Stack Developer</title>
    <meta name="description" content="Full-stack MERN developer specializing in React, Node.js, and MongoDB. Building modern, performant web applications." />
    <meta name="keywords" content="MERN stack developer, React developer, Node.js, full stack developer, web developer portfolio" />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />

    <!-- ─── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourportfolio.vercel.app/" />
    <meta property="og:title" content="Your Name | MERN Stack Developer" />
    <meta property="og:description" content="Full-stack MERN developer building modern web applications." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- ─── Twitter Card ──────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Name | MERN Stack Developer" />
    <meta name="twitter:description" content="Full-stack MERN developer building modern web applications." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- ─── Google Fonts: Syne (display) + DM Sans (body) + JetBrains Mono ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ─── Theme color for mobile browser UI ────────────────────────────── -->
    <meta name="theme-color" content="#0a0a0a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
